<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cyber Security Quiz Portal</title>

    <link rel="stylesheet"
          href="style.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ===============================
         BACKGROUND VIDEO
    ================================ -->

    <video autoplay muted loop playsinline id="bg-video">

        <source src="videos/cyber-bg.mp4"
                type="video/mp4">

    </video>

    <!-- Dark Overlay -->

    <div class="overlay"></div>

    <!-- ===============================
         LOGIN CONTAINER
    ================================ -->

    <div class="container">

        <div class="login-card">

            <!-- Shield Logo -->

            <div class="logo">

                <i class="fa-solid fa-shield-halved"></i>

            </div>

            <!-- Heading -->

            <h1>CYBER SECURITY QUIZ</h1>

            <p id="typing-text">

                Secure Authentication Required

            </p>

            <!-- Login Form -->

            <form id="loginForm">

                <!-- Username -->

                <div class="inputBox">

                    <i class="fa-solid fa-user"></i>

                    <input type="text"
                           id="username"
                           placeholder=" "
                           required>

                    <label>Username</label>

                </div>

                <!-- Gmail -->

                <div class="inputBox">

                    <i class="fa-solid fa-envelope"></i>

                    <input type="email"
                           id="gmail"
                           placeholder=" "
                           required>

                    <label>Gmail Address</label>

                </div>

                <!-- Quiz Passcode -->

                <div class="inputBox">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                           id="quizPasscode"
                           placeholder=" "
                           required>

                    <label>Quiz Passcode</label>

                    <span id="togglePassword">

                        <i class="fa-solid fa-eye"></i>

                    </span>

                </div>

                <!-- Phone -->

                <div class="inputBox">

                    <i class="fa-solid fa-phone"></i>

                    <input type="tel"
                           id="phone"
                           maxlength="10"
                           placeholder=" "
                           required>

                    <label>Phone Number</label>

                </div>

                <!-- Login Button -->

                <button type="submit">

                    <i class="fa-solid fa-shield"></i>

                    ACCESS QUIZ

                </button>

            </form>

            <!-- Footer -->

            <div class="footer">

                <i class="fa-solid fa-lock"></i>

                Secure Connection • Powered by Firebase

            </div>

        </div>

    </div>

    <!-- JavaScript -->

    <script type="module"
            src="script.js"></script>

</body>

</html>
